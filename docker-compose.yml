services:
  birthday-whatsapp-bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      APP_NAME: birthday-whatsapp-bot
      DATABASE_PATH: /app/data/birthday-whatsapp.sqlite
      WHATSAPP_AUTH_DIR: /app/sessions/baileys
    volumes:
      - birthday-whatsapp-data:/app/data
      - birthday-whatsapp-sessions:/app/sessions

volumes:
  birthday-whatsapp-data:
  birthday-whatsapp-sessions:
