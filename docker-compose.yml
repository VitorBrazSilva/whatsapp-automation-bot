services:
  whatsapp-automation-bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      APP_NAME: whatsapp-automation-bot
      DATABASE_PATH: /app/data/whatsapp-automation.sqlite
      WHATSAPP_AUTH_DIR: /app/sessions/baileys
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 3000
    volumes:
      - whatsapp-automation-data:/app/data
      - whatsapp-automation-sessions:/app/sessions
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  whatsapp-automation-data:
  whatsapp-automation-sessions:
