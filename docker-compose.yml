services:
  birthday-whatsapp-bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/birthday-bot.sqlite
      WHATSAPP_AUTH_DIR: /app/sessions/baileys
      METRICS_HOST: 0.0.0.0
    volumes:
      - birthday-bot-data:/app/data
      - birthday-bot-sessions:/app/sessions
    ports:
      - "127.0.0.1:9464:9464"

volumes:
  birthday-bot-data:
  birthday-bot-sessions:
